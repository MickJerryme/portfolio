<body>

  </div>
</nav>

<section>
  <h2>Quiz Upload</h2>
  <form id="quizForm">
    <input type="text" name="title" placeholder="Quiz Title" required>
    
    <label>Quiz File:</label>
    <input type="file" name="quizFile" accept=".pdf,.doc,.docx">
    
    <label>Proof Image (Required):</label>
    <div class="drop-zone proof-drop-zone">
      <p>Drag & drop image here or click to browse</p>
      <input type="file" accept="image/*" style="display:none;" onchange="handleImageUpload(event, this.parentElement)">
    </div>
    <div id="quizError" class="error"></div>
    
    <button type="button" onclick="handleSubmit('quizForm')">Submit Quiz</button>
  </form>
</section>

<div id="viewer">
<span class="close" onclick="closeViewer()">&times;</span>
<img id="viewerImg">
</div>

<script src="shared/script.js"></script>
<script>
function handleImageUpload(event, zone) {
  const file = event.target.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const img = document.createElement('img');
      img.src = ev.target.result;
      zone.innerHTML = '';
      zone.appendChild(img);
      img.style.cursor = 'pointer';
      img.onclick = function() { openViewer(ev.target.result); };
    };
    reader.readAsDataURL(file);
  }
}
</script>
</body>
</html>
